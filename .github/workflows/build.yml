name: Build & Push ibra-bazzite

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild chaque lundi à 6h UTC pour suivre les mises à jour Bazzite
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  IMAGE_NAME: ibra-bazzite
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date (used as image tag)
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build OCI image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ steps.date.outputs.date }}
          containerfiles: ./ibra-bazzite/Containerfile
          context: ./ibra-bazzite
          oci: true

      - name: Push image to ghcr.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}

      - name: Print image URL
        run: |
          echo "Image disponible sur : ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
